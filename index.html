<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FamPay Auto-Payment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px 35px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 5px; }
        .sub { color: #555; font-size: 14px; margin-bottom: 25px; border-left: 4px solid #6c63ff; padding-left: 12px; }
        .gmail-box {
            background: #f0f0ff; border-radius: 14px; padding: 14px 18px; margin-bottom: 22px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
            border: 1px solid #d0d0ff;
        }
        .gmail-box span { font-weight: 600; color: #1a1a2e; font-size: 15px; }
        .gmail-box .badge { background: #6c63ff; color: white; font-size: 12px; padding: 4px 14px; border-radius: 30px; font-weight: 600; }
        .field { margin-bottom: 18px; }
        label { font-weight: 600; color: #1a1a2e; display: block; margin-bottom: 6px; font-size: 14px; }
        input {
            width: 100%; padding: 14px 16px; border: 2px solid #ddd; border-radius: 14px;
            font-size: 16px; transition: 0.2s; background: #fafafa;
        }
        input:focus { border-color: #6c63ff; outline: none; background: white; box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.15); }
        .row { display: flex; gap: 12px; flex-wrap: wrap; }
        .row .field { flex: 1; min-width: 120px; }
        .btn {
            background: #6c63ff; color: white; border: none; padding: 14px 22px; border-radius: 40px;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%;
            box-shadow: 0 8px 18px rgba(108, 99, 255, 0.35);
        }
        .btn:hover { background: #5a52e0; transform: scale(1.01); }
        .btn:active { transform: scale(0.98); }
        .btn-danger { background: #e74c3c; box-shadow: 0 8px 18px rgba(231, 76, 60, 0.35); }
        .btn-danger:hover { background: #c0392b; }
        .qr-section {
            background: white; border-radius: 18px; padding: 20px; margin: 22px 0;
            text-align: center; border: 2px dashed #d0d0ff;
        }
        .qr-section img { max-width: 200px; height: auto; border-radius: 12px; background: white; padding: 6px; }
        .qr-placeholder { color: #888; font-size: 14px; padding: 20px 0; }
        .status-box {
            background: #f8f8ff; border-radius: 14px; padding: 16px 18px; margin: 18px 0 10px;
            border-left: 6px solid #6c63ff; font-size: 15px; min-height: 60px;
            display: flex; align-items: center; word-break: break-word;
        }
        .status-box .label { font-weight: 700; color: #1a1a2e; margin-right: 8px; }
        .status-box .value { color: #333; }
        .error { border-left-color: #ff4d4d !important; background: #fff0f0 !important; }
        .success { border-left-color: #2ecc71 !important; background: #f0fff4 !important; }
        .warning { border-left-color: #f39c12 !important; background: #fffbf0 !important; }
        .footer-note { margin-top: 20px; font-size: 13px; color: #666; text-align: center; border-top: 1px solid #eee; padding-top: 16px; }
        .flex-btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
        .flex-btns .btn { flex: 1; min-width: 120px; }
        .order-id-display {
            background: #eaeaff; padding: 10px 14px; border-radius: 12px; font-size: 14px;
            font-weight: 500; color: #1a1a2e; margin: 8px 0 12px; display: none;
        }
        .order-id-display.show { display: block; }
        .polling-indicator {
            display: none; font-size: 13px; color: #6c63ff; margin-top: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .polling-indicator.active { display: block; }
        .countdown { font-weight: 700; color: #e74c3c; }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .payment-done {
            background: #2ecc71; color: white; padding: 8px 16px; border-radius: 30px;
            font-weight: 700; font-size: 14px; display: inline-block;
        }
        @media (max-width: 500px) { .container { padding: 24px 18px; } .gmail-box { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>

<div class="container">
    <h1>💳 FamPay</h1>
    <div class="sub">⚡ Full Auto-Verify · No CORS Error</div>

    <div class="gmail-box">
        <span>📧 aman123450111@gmail.com</span>
        <span class="badge">🔑 rsvmellG0</span>
    </div>

    <div class="row">
        <div class="field">
            <label>₹ Amount (min 1)</label>
            <input type="number" id="amountInput" value="1" min="1" step="1" />
        </div>
        <div class="field" style="flex:1.5;">
            <label>Order ID</label>
            <input type="text" id="orderIdInput" placeholder="Auto" />
        </div>
    </div>

    <button class="btn" id="generateBtn">🚀 Generate QR & Auto-Verify</button>

    <div class="qr-section">
        <div id="qrContainer">
            <img id="qrImage" src="" alt="QR" style="display:none; max-width:200px;" />
            <div class="qr-placeholder" id="qrPlaceholder">📱 QR Code will appear here</div>
        </div>
        <div style="margin-top:10px; font-size:13px; color:#555;">
            <span id="qrOrderDisplay"></span>
        </div>
        <div class="polling-indicator" id="pollingIndicator">
            🔄 Auto-verifying... <span class="countdown" id="countdownTimer">5</span>s
        </div>
    </div>

    <div class="order-id-display" id="orderIdDisplay">
        🆔 Order: <span id="orderIdSpan"></span>
    </div>

    <div class="flex-btns">
        <button class="btn" id="verifyBtn" style="background:#2ecc71;">✅ Verify Now</button>
        <button class="btn btn-danger" id="stopBtn">⏹ Stop Auto</button>
        <button class="btn" id="copyBtn" style="background:#3d3b6b;">📋 Copy ID</button>
    </div>

    <div class="status-box" id="statusBox">
        <span class="label">📌 Status:</span>
        <span class="value" id="statusText">Ready</span>
    </div>

    <div class="footer-note">
        🔥 Scan QR → Pay → Auto-verify ho jayega (5 sec mein)
    </div>
</div>

<script>
(function() {
    const GMAIL_KEY = 'rsvmellG0';
    // USE CORS PROXY - YEH CORS ERROR FIX KAREGA
    const CORS_PROXY = 'https://cors-anywhere.herokuapp.com/';
    const BASE_URL = 'https://api.fampay.in';
    const API_URL = CORS_PROXY + BASE_URL;

    // DOM
    const amountInput = document.getElementById('amountInput');
    const orderIdInput = document.getElementById('orderIdInput');
    const generateBtn = document.getElementById('generateBtn');
    const verifyBtn = document.getElementById('verifyBtn');
    const stopBtn = document.getElementById('stopBtn');
    const copyBtn = document.getElementById('copyBtn');
    const qrImage = document.getElementById('qrImage');
    const qrPlaceholder = document.getElementById('qrPlaceholder');
    const qrOrderDisplay = document.getElementById('qrOrderDisplay');
    const orderIdDisplay = document.getElementById('orderIdDisplay');
    const orderIdSpan = document.getElementById('orderIdSpan');
    const statusText = document.getElementById('statusText');
    const statusBox = document.getElementById('statusBox');
    const pollingIndicator = document.getElementById('pollingIndicator');
    const countdownTimer = document.getElementById('countdownTimer');

    let currentOrderId = '';
    let pollingInterval = null;
    let countdownInterval = null;
    let countdown = 5;
    let isPaid = false;

    function setStatus(msg, type = 'info') {
        statusText.textContent = msg;
        statusBox.className = 'status-box';
        if (type === 'error') statusBox.classList.add('error');
        else if (type === 'success') statusBox.classList.add('success');
        else if (type === 'warning') statusBox.classList.add('warning');
    }

    function generateOrderId() {
        return 'ORD-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    function getOrderId() {
        let val = orderIdInput.value.trim();
        if (!val) {
            val = generateOrderId();
            orderIdInput.value = val;
        }
        return val;
    }

    function displayOrderId(orderId) {
        currentOrderId = orderId;
        orderIdSpan.textContent = orderId;
        orderIdDisplay.classList.add('show');
        qrOrderDisplay.textContent = '🆔 ' + orderId;
    }

    // ---------- AUTO VERIFY ----------
    function startAutoVerify(orderId) {
        stopAutoVerify();
        isPaid = false;
        countdown = 5;
        pollingIndicator.classList.add('active');
        setStatus('⏳ Auto-verify started... Will check every 5s', 'warning');

        // Countdown timer
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            countdown--;
            if (countdown < 1) countdown = 5;
            countdownTimer.textContent = countdown;
        }, 1000);

        // Polling
        pollingInterval = setInterval(async () => {
            if (isPaid) {
                stopAutoVerify();
                return;
            }
            await checkPayment(orderId);
        }, 5000);

        // First check immediately
        setTimeout(() => checkPayment(orderId), 1000);
    }

    function stopAutoVerify() {
        if (pollingInterval) {
            clearInterval(pollingInterval);
            pollingInterval = null;
        }
        if (countdownInterval) {
            clearInterval(countdownInterval);
            countdownInterval = null;
        }
        pollingIndicator.classList.remove('active');
    }

    async function checkPayment(orderId) {
        try {
            const url = `${API_URL}/verify?order_id=${encodeURIComponent(orderId)}&gmail_key=${encodeURIComponent(GMAIL_KEY)}`;
            const response = await fetch(url);
            
            if (!response.ok) {
                console.log('Polling: HTTP error', response.status);
                return;
            }
            
            const data = await response.json();
            console.log('Auto-verify:', data);

            if (data.status === 'success' || data.paid === true || data.status === 'paid') {
                isPaid = true;
                setStatus('✅ Payment Verified! Transaction successful 🎉', 'success');
                stopAutoVerify();
                document.getElementById('qrContainer').innerHTML += '<br><span class="payment-done">✅ PAID</span>';
            } else if (data.status === 'failed') {
                isPaid = true;
                setStatus('❌ Payment failed. Try again.', 'error');
                stopAutoVerify();
            }
        } catch (err) {
            console.log('Polling error:', err.message);
            // Don't stop on network error
        }
    }

    // ---------- GENERATE QR ----------
    async function generateQR(amount, orderId) {
        try {
            setStatus('⏳ Generating QR...', 'info');
            stopAutoVerify();
            
            // Reset QR display
            qrImage.style.display = 'none';
            qrPlaceholder.style.display = 'block';
            qrPlaceholder.textContent = '⏳ Generating...';

            const url = `${API_URL}/qr-gen?amount=${encodeURIComponent(amount)}&gmail_key=${encodeURIComponent(GMAIL_KEY)}&order_id=${encodeURIComponent(orderId)}`;
            
            // Try to fetch QR as image
            const imgUrl = url + '&t=' + Date.now();
            qrImage.src = imgUrl;
            qrImage.style.display = 'block';
            qrPlaceholder.style.display = 'none';

            displayOrderId(orderId);
            setStatus('✅ QR Generated! Scan with FamPay', 'success');

            // Start auto-verify
            startAutoVerify(orderId);

            qrImage.onerror = function() {
                // Agar image load na ho, toh try JSON response
                qrImage.style.display = 'none';
                qrPlaceholder.style.display = 'block';
                qrPlaceholder.textContent = '⚠️ QR API error. Trying alternate method...';
                
                // Try fetching as JSON
                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        console.log('QR Response:', data);
                        if (data.qr_code || data.qr) {
                            qrImage.src = data.qr_code || data.qr;
                            qrImage.style.display = 'block';
                            qrPlaceholder.style.display = 'none';
                            setStatus('✅ QR Generated (JSON response)', 'success');
                        } else {
                            qrPlaceholder.textContent = '❌ QR generation failed: ' + JSON.stringify(data);
                            setStatus('❌ QR generation failed', 'error');
                            stopAutoVerify();
                        }
                    })
                    .catch(err => {
                        qrPlaceholder.textContent = '❌ Error: ' + err.message;
                        setStatus('❌ Error generating QR', 'error');
                        stopAutoVerify();
                    });
            };

            qrImage.onload = function() {
                // QR loaded successfully
            };

        } catch (err) {
            setStatus('❌ Error: ' + err.message, 'error');
            console.error(err);
            stopAutoVerify();
        }
    }

    // ---------- MANUAL VERIFY ----------
    async function verifyPayment(orderId) {
        if (!orderId) {
            setStatus('⚠️ No Order ID', 'error');
            return;
        }
        setStatus('⏳ Verifying...', 'info');
        await checkPayment(orderId);
    }

    // ---------- EVENTS ----------
    generateBtn.addEventListener('click', function() {
        const amount = parseInt(amountInput.value) || 1;
        if (amount < 1) {
            setStatus('⚠️ Minimum ₹1', 'error');
            return;
        }
        const orderId = getOrderId();
        generateQR(amount, orderId);
    });

    verifyBtn.addEventListener('click', function() {
        const orderId = currentOrderId || orderIdInput.value.trim();
        verifyPayment(orderId);
    });

    stopBtn.addEventListener('click', function() {
        stopAutoVerify();
        setStatus('⏹ Auto-verify stopped', 'info');
    });

    copyBtn.addEventListener('click', function() {
        const orderId = currentOrderId || orderIdInput.value.trim();
        if (!orderId) {
            setStatus('⚠️ No Order ID', 'error');
            return;
        }
        navigator.clipboard.writeText(orderId).then(() => {
            setStatus('📋 Copied: ' + orderId, 'success');
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = orderId;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            setStatus('📋 Copied (fallback)', 'success');
        });
    });

    // Enter key
    document.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('keypress', e => {
            if (e.key === 'Enter') generateBtn.click();
        });
    });

    // Init
    orderIdInput.value = generateOrderId();
    setStatus('Ready. Enter amount and click Generate', 'info');

})();
</script>
</body>
</html>
